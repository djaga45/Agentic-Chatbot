from crewai import Agent, Task, Crew, Process, LLM
import streamlit as st
import fitz
from dotenv import load_dotenv
import os
import litellm

# Configure LiteLLM to automatically retry requests on rate limits
litellm.num_retries = 5

# Monkey patch for CrewAI prompt caching bug with Groq
try:
    import crewai.llms.cache as _crewai_cache
    _crewai_cache.mark_cache_breakpoint = lambda msg: msg
except Exception:
    pass

# Load environment variables
load_dotenv()
groq_api_key = os.getenv("GROQ_API_KEY")

# ==================== GROQ LLM CONFIGURATION ====================
llm_large = LLM(
    model="groq/llama-3.3-70b-versatile",
    api_key=groq_api_key,
    temperature=0.7,
)

llm_mini = LLM(
    model="groq/llama-3.1-8b-instant",
    api_key=groq_api_key,
    temperature=0.7,
)

# Embedder config
embedder_config = {
    "provider": "ollama",
    "config": {
        "model_name": "nomic-embed-text:latest",
        "url": "http://localhost:11434/api/embeddings"
    }
}

# ==================== AGENTS ====================
researcher = Agent(
    role="Senior Researcher",
    goal="Research the user's question thoroughly",
    backstory="You are an expert at finding accurate information.",
    llm=llm_large,
    verbose=True,
)

analyst = Agent(
    role="Critical Analyst",
    goal="Analyze the information and give deep insights",
    backstory="You think critically and find important points.",
    llm=llm_large,
    verbose=True,
)

responder = Agent(
    role="Helpful Assistant",
    goal="Give a clear and friendly final answer",
    backstory="You explain things simply and helpfully.",
    llm=llm_mini,
    verbose=True,
)

auditor = Agent(
    role="Hallucination Auditor",
    goal="Verify that the final response is completely grounded in and supported by the provided PDF context.",
    backstory="You are a strict QA fact-checker. You compare the final output of the assistant with the parsed PDF text and identify any unsupported claims or hallucinations.",
    llm=llm_large,
    verbose=True,
)

# ==================== TASKS ====================
research_task = Task(
    description="Research this question: {question}\n\nUse the following PDF document context if it is provided:\n{pdf_context}",
    expected_output="Detailed research points based on the question and provided PDF document context.",
    agent=researcher,
)

analysis_task = Task(
    description="Analyze the research and give key insights.",
    expected_output="Critical analysis with insights.",
    agent=analyst,
)

final_answer_task = Task(
    description="Create a clear, friendly final answer for the user.",
    expected_output="Helpful and well-written answer.",
    agent=responder,
)

audit_task = Task(
    description=(
        "You are auditing the final answer generated by the Responder agent.\n"
        "1. Compare the final answer with the source PDF document context: {pdf_context}\n"
        "2. Identify if there are any claims in the answer that are NOT supported by the PDF context.\n"
        "3. Compute a Faithfulness Score (from 0% to 100%, where 100% means everything is supported by the PDF).\n\n"
        "Output format:\n"
        "### 🔍 Faithfulness Audit Report\n"
        "- **Faithfulness Score**: [0-100]%\n"
        "- **Hallucinations/Unsupported Claims**: [List any claims not found in the PDF, or write 'None']\n\n"
        "### 🤖 Final Audited Response\n"
        "[The final answer, with any hallucinations removed or corrected]"
    ),
    expected_output="A structured report containing the Faithfulness Score, a list of unsupported claims, and the final audited answer.",
    agent=auditor,
)

# ==================== CREW ====================
crew = Crew(
    agents=[researcher, analyst, responder, auditor],
    tasks=[research_task, analysis_task, final_answer_task, audit_task],
    process=Process.sequential,
    memory=False,
    embedder=embedder_config,
    verbose=True
)

# ==================== STREAMLIT CHATBOT ====================
st.set_page_config(page_title="Local Multi-Agent Chatbot", page_icon="JD")

# Sidebar for PDF upload
st.sidebar.title(" Document Upload")

if not groq_api_key:
    st.sidebar.warning("GROQ_API_KEY is missing in your `.env` file! Please add it to start.")

uploaded_file = st.sidebar.file_uploader("Upload a PDF file to analyze", type=["pdf"])

pdf_text = ""
if uploaded_file is not None:
    try:
        # Extract text from PDF using PyMuPDF
        doc = fitz.open(stream=uploaded_file.read(), filetype="pdf")
        pages_text = []
        for page in doc:
            pages_text.append(page.get_text())
        pdf_text = "\n".join(pages_text)
        
        st.sidebar.success(f"Loaded PDF ({len(doc)} pages, {len(pdf_text)} characters)")
    except Exception as e:
        st.sidebar.error(f" Error reading PDF: {e}")
        pdf_text = "No PDF context provided."
else:
    pdf_text = "No PDF context provided."

st.title("Multi-Agent Chatbot")


if "messages" not in st.session_state:
    st.session_state.messages = []

for message in st.session_state.messages:
    with st.chat_message(message["role"]):
        st.markdown(message["content"])

if prompt := st.chat_input("Ask me anything..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    with st.chat_message("user"):
        st.markdown(prompt)

    with st.chat_message("assistant"):
        with st.spinner("Agents are thinking... (this can take 30-90 seconds)"):
            try:
                result = crew.kickoff(inputs={
                    "question": prompt,
                    "pdf_context": pdf_text
                })
                response = result.raw
            except Exception as e:
                err_msg = str(e).lower()
                if "ratelimit" in err_msg or "rate limit" in err_msg or "rate_limit_exceeded" in err_msg:
                    response = " The Groq API token limit has been reached. If you just sent a large request, please wait 15–30 seconds for the limit to reset. If you have run many requests, your daily token limit may be completed for the day."
                else:
                    response = f"Sorry, there was an error: {str(e)}"
            
            st.markdown(response)
    
    st.session_state.messages.append({"role": "assistant", "content": response})